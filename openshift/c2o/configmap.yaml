apiVersion: v1
kind: ConfigMap
metadata:
  name: c2o-config
data:
  # vllm-sr configuration
  vllm-sr-config.yaml: |
    version: v0.3

    listeners:
      - name: http-8899
        address: 0.0.0.0
        port: 8899
        timeout: 300s

    providers:
      defaults:
        default_model: kimi-k2-6
        default_reasoning_effort: high
        reasoning_families:
          gpt:
            type: reasoning_effort
            parameter: reasoning.effort
      models:
        - name: kimi-k2-6
          provider_model_id: kimi-k2-6
          api_format: openai
          backend_refs:
            - name: remote-primary
              base_url: https://$(KIMI_HOST)/prelude-maas/kimi-k2-6/v1
              provider: openai
              auth_header: Authorization
              auth_prefix: Bearer
              api_key_env: TOKEN
              weight: 100
        - name: claude-sonnet
          provider_model_id: claude-sonnet-4-6
          api_format: anthropic
          backend_refs:
            - name: vertex-primary
              base_url: https://us-east5-aiplatform.googleapis.com/v1/projects/$(GCP_PROJECT_ID)/locations/us-east5/publishers/anthropic/models/claude-sonnet-4-6/v1
              provider: openai
              auth_header: Authorization
              auth_prefix: Bearer
              api_key_env: GCP_ACCESS_TOKEN
              weight: 100
        - name: claude-opus
          provider_model_id: claude-opus-4-6
          api_format: anthropic
          backend_refs:
            - name: vertex-opus
              base_url: https://us-east5-aiplatform.googleapis.com/v1/projects/$(GCP_PROJECT_ID)/locations/us-east5/publishers/anthropic/models/claude-opus-4-6/v1
              provider: openai
              auth_header: Authorization
              auth_prefix: Bearer
              api_key_env: GCP_ACCESS_TOKEN
              weight: 100
        - name: claude-opus-4-7
          provider_model_id: claude-opus-4-7
          api_format: anthropic
          backend_refs:
            - name: vertex-opus-4-7
              base_url: https://us-east5-aiplatform.googleapis.com/v1/projects/$(GCP_PROJECT_ID)/locations/us-east5/publishers/anthropic/models/claude-opus-4-7/v1
              provider: openai
              auth_header: Authorization
              auth_prefix: Bearer
              api_key_env: GCP_ACCESS_TOKEN
              weight: 100

    routing:
      modelCards:
        - name: kimi-k2-6
          modality: text
          capabilities:
            - chat
            - reasoning
            - coding
            - debugging
            - refactoring
        - name: claude-sonnet
          modality: text
          capabilities:
            - chat
            - reasoning
            - coding
            - debugging
            - refactoring
        - name: claude-opus
          modality: text
          capabilities:
            - chat
            - reasoning
            - deep_analysis
            - architecture
            - complex_problem_solving
        - name: claude-opus-4-7
          modality: text
          capabilities:
            - chat
            - reasoning
            - deep_analysis
            - architecture
            - complex_problem_solving

      signals:
        keywords:
          - name: deep_analysis_keywords
            operator: OR
            keywords:
              - analyze
              - analyse
              - explain why
              - compare
              - evaluate
              - critique
              - summarize this paper
              - summarise
              - write an essay
              - pros and cons
              - trade-offs
              - tradeoffs
              - implications
              - nuance
              - ethical
              - philosophy
            case_sensitive: false
          - name: coding_keywords
            operator: OR
            keywords:
              - implement
              - refactor
              - debug
              - function
              - class
              - import
              - build
              - code
              - fix
              - bug
              - error
              - compile
              - test
              - deploy
              - script
              - regex
              - parse
              - convert
              - translate
            case_sensitive: false
          - name: opus_keywords
            operator: OR
            keywords:
              - architect
              - design pattern
              - system design
              - algorithm design
              - complex
              - performance optimization
              - refactor entire
              - rewrite
              - root cause analysis
              - competitive programming
              - research
              - whitepaper
              - mathematical proof
              - edge case
              - corner case
              - thread safety
              - concurrency
              - distributed system
              - microservices architecture
            case_sensitive: false

      decisions:
        - name: opus-complex-route
          description: Route very complex architectural tasks to Opus
          priority: 95
          rules:
            operator: OR
            conditions:
              - type: keyword
                name: opus_keywords
          modelRefs:
            - model: claude-opus
              use_reasoning: true
        - name: deep-analysis-route
          description: Route complex reasoning tasks to Claude
          priority: 90
          rules:
            operator: OR
            conditions:
              - type: keyword
                name: deep_analysis_keywords
          modelRefs:
            - model: claude-sonnet
              use_reasoning: true
        - name: coding-route
          description: Route coding tasks to Kimi
          priority: 80
          rules:
            operator: OR
            conditions:
              - type: keyword
                name: coding_keywords
          modelRefs:
            - model: kimi-k2-6
              use_reasoning: false
        - name: default-route
          description: Default route to Kimi
          priority: 1
          rules:
            operator: AND
            conditions: []
          modelRefs:
            - model: kimi-k2-6
              use_reasoning: false

    global:
      router:
        config_source: file
      stores:
        semantic_cache:
          enabled: false
      services:
        observability:
          metrics:
            enabled: true
        router_replay:
          enabled: false

  # Envoy configuration - simplified for single-container mode
  envoy-config.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
    static_resources:
      listeners:
      - name: http-8899
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8899
        perConnectionBufferLimitBytes: 524288000
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              codec_type: AUTO
              route_config:
                name: local_route
                virtual_hosts:
                - name: local_service
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                      headers:
                      - name: x-selected-model
                        string_match:
                          exact: "kimi-k2-6"
                    route:
                      cluster: kimi_k2_6_cluster
                      timeout: 300s
                      idleTimeout: 1200s
                      host_rewrite_literal: "${KIMI_HOST}"
                  - match:
                      prefix: "/"
                      headers:
                      - name: x-selected-model
                        string_match:
                          exact: "claude-sonnet"
                    route:
                      cluster: claude_sonnet_cluster
                      timeout: 300s
                      idleTimeout: 1200s
                      host_rewrite_literal: "us-east5-aiplatform.googleapis.com"
                      regex_rewrite:
                        pattern:
                          google_re2: {}
                          regex: ".*"
                        substitution: "/v1/projects/${GCP_PROJECT_ID}/locations/us-east5/publishers/anthropic/models/claude-sonnet-4-6:rawPredict"
                  - match:
                      prefix: "/"
                      headers:
                      - name: x-selected-model
                        string_match:
                          exact: "claude-opus"
                    route:
                      cluster: claude_opus_cluster
                      timeout: 300s
                      idleTimeout: 1200s
                      host_rewrite_literal: "us-east5-aiplatform.googleapis.com"
                      regex_rewrite:
                        pattern:
                          google_re2: {}
                          regex: ".*"
                        substitution: "/v1/projects/${GCP_PROJECT_ID}/locations/us-east5/publishers/anthropic/models/claude-opus-4-6:rawPredict"
                  - match:
                      prefix: "/"
                      headers:
                      - name: x-selected-model
                        string_match:
                          exact: "claude-opus-4-7"
                    route:
                      cluster: claude_opus_4_7_cluster
                      timeout: 300s
                      idleTimeout: 1200s
                      host_rewrite_literal: "us-east5-aiplatform.googleapis.com"
                      regex_rewrite:
                        pattern:
                          google_re2: {}
                          regex: ".*"
                        substitution: "/v1/projects/${GCP_PROJECT_ID}/locations/us-east5/publishers/anthropic/models/claude-opus-4-7:rawPredict"
                  - match:
                      prefix: "/"
                    route:
                      cluster: kimi_k2_6_cluster
                      timeout: 300s
                      host_rewrite_literal: "${KIMI_HOST}"
              http_filters:
              - name: envoy.filters.http.ext_proc
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                  allow_mode_override: true
                  grpc_service:
                    envoy_grpc:
                      cluster_name: extproc_service
                    timeout: 1200s
                  processing_mode:
                    request_header_mode: "SEND"
                    response_header_mode: "SEND"
                    request_body_mode: "BUFFERED"
                    response_body_mode: "BUFFERED"
                  message_timeout: 300s
              - name: envoy.filters.http.lua
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                  default_source_code:
                    inline_string: |
                      function envoy_on_request(request_handle)
                        local model = request_handle:headers():get("x-selected-model")
                        if model == "claude-sonnet" or model == "claude-opus" or model == "claude-opus-4-7" then
                          local body_handle = request_handle:body()
                          if body_handle and body_handle:length() > 0 then
                            local raw = body_handle:getBytes(0, body_handle:length())
                            local no_model = raw:gsub('"model":"[^"]*",?', '', 1)
                            no_model = no_model:gsub(',%s*}', '}')
                            local patched = no_model:gsub('^{', '{"anthropic_version":"vertex-2023-10-16",', 1)
                            body_handle:setBytes(patched)
                            request_handle:headers():replace("content-length", tostring(body_handle:length()))
                          end
                          local headers, body = request_handle:httpCall(
                            "gcp_token_server",
                            { [":method"] = "GET", [":path"] = "/token", [":authority"] = "gcp-token-server" },
                            "", 5000)
                          if headers and headers[":status"] == "200" and body and body ~= "" then
                            request_handle:headers():replace("authorization", "Bearer " .. body)
                          end
                          request_handle:headers():remove("x-api-key")
                        end
                      end
                      function envoy_on_response(response_handle)
                      end
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
      - name: extproc_service
        connect_timeout: 1200s
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        load_assignment:
          cluster_name: extproc_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 50051
      - name: kimi_k2_6_cluster
        connect_timeout: 1200s
        type: LOGICAL_DNS
        dns_lookup_family: V4_ONLY
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: kimi_k2_6_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: ${KIMI_HOST}
                    port_value: 443
              hostname: "${KIMI_HOST}"
              load_balancing_weight: 100
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: ${KIMI_HOST}
            common_tls_context:
              tls_params:
                tls_minimum_protocol_version: TLSv1_2
                tls_maximum_protocol_version: TLSv1_3
      - name: gcp_token_server
        connect_timeout: 5s
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: gcp_token_server
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 8888
      - name: claude_sonnet_cluster
        connect_timeout: 1200s
        type: LOGICAL_DNS
        dns_lookup_family: V4_ONLY
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: claude_sonnet_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: us-east5-aiplatform.googleapis.com
                    port_value: 443
              hostname: "us-east5-aiplatform.googleapis.com"
              load_balancing_weight: 100
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: us-east5-aiplatform.googleapis.com
            common_tls_context:
              tls_params:
                tls_minimum_protocol_version: TLSv1_2
                tls_maximum_protocol_version: TLSv1_3
      - name: claude_opus_cluster
        connect_timeout: 1200s
        type: LOGICAL_DNS
        dns_lookup_family: V4_ONLY
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: claude_opus_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: us-east5-aiplatform.googleapis.com
                    port_value: 443
              hostname: "us-east5-aiplatform.googleapis.com"
              load_balancing_weight: 100
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: us-east5-aiplatform.googleapis.com
            common_tls_context:
              tls_params:
                tls_minimum_protocol_version: TLSv1_2
                tls_maximum_protocol_version: TLSv1_3
      - name: claude_opus_4_7_cluster
        connect_timeout: 1200s
        type: LOGICAL_DNS
        dns_lookup_family: V4_ONLY
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: claude_opus_4_7_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: us-east5-aiplatform.googleapis.com
                    port_value: 443
              hostname: "us-east5-aiplatform.googleapis.com"
              load_balancing_weight: 100
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: us-east5-aiplatform.googleapis.com
            common_tls_context:
              tls_params:
                tls_minimum_protocol_version: TLSv1_2
                tls_maximum_protocol_version: TLSv1_3
    layered_runtime:
      layers:
      - name: static_layer
        static_layer:
          overload:
            global_downstream_max_connections: 50000
